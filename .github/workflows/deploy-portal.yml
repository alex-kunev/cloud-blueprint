name: Deploy Portal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/deploy-portal.yml"
  workflow_dispatch:

permissions:
  pages:    write
  id-token: write   # required for Pages deployment token

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config values
        run: |
          cd portal
          sed -i \
            -e "s|__GITHUB_OWNER__|${{ github.repository_owner }}|g" \
            -e "s|__GITHUB_REPO__|${GITHUB_REPOSITORY#*/}|g" \
            -e "s|__GITHUB_TOKEN__|${{ secrets.PORTAL_DISPATCH_TOKEN }}|g" \
            config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portal

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
